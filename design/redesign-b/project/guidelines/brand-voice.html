<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--cg-bg); font-family: var(--font-sans);
         color: var(--cg-text); }
  .quote { font-size: 15px; line-height: 1.7; max-width: 600px; }
  .quote b { color: var(--cg-red); font-weight: 600; }
  .meta { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--cg-text-muted);
         background: var(--cg-bg-secondary); border: 1px solid var(--cg-border);
         border-radius: var(--radius-pill); padding: 3px 10px; }
</style></head>
<body>
  <div class="quote">「設定定義ファイルを<b>アップロード</b>し、「<b>CLIコマンド生成</b>」をクリックして結果を確認してください。」</div>
  <div class="meta">
    <span class="tag">丁寧体 / です・ます</span>
    <span class="tag">直接的</span>
    <span class="tag">手順は番号付き</span>
    <span class="tag">専門用語そのまま</span>
  </div>
</body>
</html>
