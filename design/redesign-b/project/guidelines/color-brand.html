<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--cg-bg); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); padding: 12px; min-height: 86px;
        display: flex; flex-direction: column; justify-content: space-between;
        border: 1px solid var(--cg-border); }
  .name { font-family: var(--font-sans); font-size: 12px; font-weight: 600; color: #fff; }
  .hex  { font-family: var(--font-mono); font-size: 12px; color: rgba(255,255,255,.85); }
  .dark .name, .dark .hex { color: var(--cg-text); }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background: var(--cg-red);"><span class="name">red</span><span class="hex">#FF4B4B</span></div>
    <div class="sw" style="background: var(--cg-red-hover);"><span class="name">red-hover</span><span class="hex">#FF6C6C</span></div>
    <div class="sw" style="background: var(--cg-red-active);"><span class="name">red-active</span><span class="hex">#FF2B2B</span></div>
    <div class="sw" style="background: var(--cg-red-tint);"><span class="name" style="color:var(--cg-text-inverse)">red-tint</span><span class="hex" style="color:rgba(49,51,63,.8)">#FF8C8C</span></div>
  </div>
</body>
</html>
