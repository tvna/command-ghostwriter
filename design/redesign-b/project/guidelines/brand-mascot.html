<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--cg-bg); font-family: var(--font-sans);
         display: flex; align-items: center; gap: 26px; }
  .mark { width: 120px; height: 120px; background: #fff; border-radius: var(--radius-lg);
          display: grid; place-items: center; flex-shrink: 0; box-shadow: var(--shadow-md); }
  .mark img { width: 104px; height: 104px; object-fit: contain; }
  h1 { margin: 0 0 6px; font-size: 28px; font-weight: 700; color: var(--cg-text);
       letter-spacing: -.01em; }
  p { margin: 0; font-size: 13px; color: var(--cg-text-muted); max-width: 300px; line-height: 1.5; }
</style></head>
<body>
  <div class="mark"><img src="../assets/icon.png" alt="Command Ghostwriter mascot"></div>
  <div>
    <h1>Command ghostwriter 👻</h1>
    <p>A ghost that writes your commands for you. The mark is always paired with the ghost emoji and lowercase “ghostwriter”.</p>
  </div>
</body>
</html>
