<!-- @dsCard group="Brand" viewport="700x380" name="Iconography — infra icon set & mark" subtitle="Terminal-faced ghost mark + tintable line icons for servers, switches, configs" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--cg-bg); font-family: var(--font-sans); color: var(--cg-text); }
  .top { display: flex; align-items: center; gap: 18px; padding-bottom: 16px; margin-bottom: 16px;
         border-bottom: 1px solid var(--cg-border); }
  .mark-dark { width: 56px; height: 56px; }
  .mark-chip { width: 56px; height: 56px; background: #fff; border-radius: var(--radius-md);
               display: grid; place-items: center; }
  .mark-chip img { width: 42px; height: 42px; }
  .sizes { display: flex; align-items: flex-end; gap: 12px; }
  .sizes img { display: block; }
  .lockup { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .lockup img { width: 34px; height: 34px; }
  .lockup b { font-size: var(--text-md); font-weight: 700; }
  .lockup .pr { font-family: var(--font-mono); color: var(--cg-red-tint); }

  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 12px 4px;
          border: 1px solid var(--cg-border); border-radius: var(--radius-md); background: var(--cg-bg-secondary); }
  .ic { width: 26px; height: 26px; color: var(--cg-text); display: grid; place-items: center; }
  .ic svg { width: 26px; height: 26px; }
  .cell.red .ic { color: var(--cg-red); }
  .cap { font-size: 10px; color: var(--cg-text-muted); font-family: var(--font-mono); }
</style></head>
<body>
  <div class="top">
    <img class="mark-dark" src="../assets/brand/logo-mark.svg" alt="mark">
    <div class="mark-chip"><img src="../assets/brand/logo-mark.svg" alt="mark on light"></div>
    <div class="sizes">
      <img src="../assets/brand/logo-mark.svg" width="40" height="40" alt="">
      <img src="../assets/brand/logo-mark.svg" width="28" height="28" alt="">
      <img src="../assets/brand/logo-mark.svg" width="18" height="18" alt="">
    </div>
    <div class="lockup">
      <img src="../assets/brand/logo-mark.svg" alt="">
      <b>Command ghostwriter <span class="pr">&gt;_</span></b>
    </div>
  </div>

  <div class="grid" id="grid"></div>
  <script>
    const ICONS = ['server','router','switch','ethernet-port','topology','terminal','ghost',
                   'config-file','template-file','generate','settings','copy','download','upload-cloud'];
    const LABEL = { 'ethernet-port':'port','config-file':'config','template-file':'template','upload-cloud':'upload' };
    const RED = new Set(['server','terminal','generate']);
    const grid = document.getElementById('grid');
    Promise.all(ICONS.map(async (name) => {
      const svg = await (await fetch('../assets/icons/' + name + '.svg')).text();
      const cell = document.createElement('div');
      cell.className = 'cell' + (RED.has(name) ? ' red' : '');
      cell.innerHTML = '<span class="ic">' + svg + '</span><span class="cap">' + (LABEL[name] || name) + '</span>';
      return cell;
    })).then((cells) => cells.forEach((c) => grid.appendChild(c)));
  </script>
</body>
</html>
