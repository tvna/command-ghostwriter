<!-- @dsCard group="Brand" viewport="700x150" name="Emoji iconography" subtitle="Tabs and headers are labelled with native emoji" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--cg-bg); font-family: var(--font-sans); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .chip { display: flex; flex-direction: column; align-items: center; gap: 6px;
          background: var(--cg-bg-secondary); border: 1px solid var(--cg-border);
          border-radius: var(--radius-md); padding: 12px 14px; min-width: 96px; }
  .emoji { font-size: 26px; line-height: 1; }
  .lbl { font-size: 12px; color: var(--cg-text); font-weight: 600; }
  .code { font-family: var(--font-mono); font-size: 10px; color: var(--cg-text-faint); }
</style></head>
<body>
  <div class="row">
    <div class="chip"><span class="emoji">📝</span><span class="lbl">コマンド生成</span><span class="code">:memo:</span></div>
    <div class="chip"><span class="emoji">📜</span><span class="lbl">設定デバッグ</span><span class="code">:scroll:</span></div>
    <div class="chip"><span class="emoji">⚙️</span><span class="lbl">詳細設定</span><span class="code">:gear:</span></div>
    <div class="chip"><span class="emoji">💼</span><span class="lbl">サンプル集</span><span class="code">:briefcase:</span></div>
    <div class="chip"><span class="emoji">🔀</span><span class="lbl">ワークフロー</span><span class="code">:twisted:</span></div>
  </div>
</body>
</html>
