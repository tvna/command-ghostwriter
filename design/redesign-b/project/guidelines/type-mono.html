<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px 20px; background: var(--cg-bg); }
  .well { background: var(--cg-bg-code); border: 1px solid var(--cg-border);
          border-radius: var(--radius-md); padding: 14px 16px;
          font-family: var(--font-mono); font-size: 13px; line-height: 1.6;
          color: var(--cg-text); white-space: pre; overflow: hidden; }
  .c { color: var(--cg-text-faint); }
  .k { color: var(--cg-info); }
  .s { color: var(--cg-success); }
</style></head>
<body>
  <div class="well"><span class="c"># GigabitEthernet0/1 (admin office)</span>
ssh <span class="k">192.168.1.101</span> <span class="s">"df -h"</span>
ssh <span class="k">192.168.1.102</span> <span class="s">"free -m"</span></div>
</body>
</html>
