<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;padding:22px;background:var(--cg-bg);font-family:var(--font-sans)}
.col{display:flex;flex-direction:column;gap:16px;max-width:560px}
.row{display:flex;gap:18px;align-items:flex-end}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { FileUploader, Toggle, Selectbox, RadioGroup, TextInput } = window.CommandGhostwriterDesignSystem_0d5f31;
function Demo() {
  const [tog, setTog] = React.useState(true);
  const [sel, setSel] = React.useState('Shift_JIS');
  const [rad, setRad] = React.useState('txt');
  const [txt, setTxt] = React.useState('command');
  return (
    <div className="col">
      <FileUploader label="設定定義ファイルをアップロード" accept="TOML, YAML, CSV"
        fileName="cisco_config.toml" fileSize="889 B" />
      <div className="row">
        <Toggle checked={tog} label="変数チェック厳格化" onChange={setTog} />
      </div>
      <div className="row">
        <Selectbox label="文字コード" value={sel} options={['Shift_JIS','utf-8']} onChange={setSel} style={{flex:1}} />
        <TextInput label="ファイル名" value={txt} onChange={setTxt} style={{flex:1}} />
      </div>
      <RadioGroup label="拡張子" value={rad} options={['txt','md']} horizontal onChange={setRad} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
