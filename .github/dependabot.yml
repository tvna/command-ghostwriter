#
# Dependabot Updates
#
# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/ja/code-security/dependabot/working-with-dependabot/dependabot-options-reference
#
# NOTE: develop ブランチはリタイア済み。Dependabot はデフォルトブランチ (main)
# を対象とする (target-branch を指定しない = デフォルトブランチ)。
# `security-updates` は dependabot.yml の有効キーではないため削除した
# (セキュリティ更新はリポジトリ設定側で有効化する)。Refs #367。
---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    groups:
      github-actions:
        patterns:
          - "*"
    schedule:
      interval: daily
      time: "18:00"
      timezone: "Asia/Tokyo"

  - package-ecosystem: npm
    directory: /
    groups:
      npm:
        patterns:
          - "*"
    schedule:
      interval: daily
      time: "19:00"
      timezone: "Asia/Tokyo"

  - package-ecosystem: pip
    directory: /
    groups:
      pip:
        patterns:
          - "*"
    schedule:
      interval: daily
      time: "20:00"
      timezone: "Asia/Tokyo"

  - package-ecosystem: devcontainers
    directory: /
    groups:
      devcontainers:
        patterns:
          - "*"
    schedule:
      interval: daily
      time: "21:00"
      timezone: "Asia/Tokyo"
