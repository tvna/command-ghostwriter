---
name: "Setup Python Environment"
description: "Setup Python and install dependencies with uv"
inputs:
  python-version:
    description: "Python version to use"
    required: true

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        # Keep in lockstep with [tool.uv].required-version in pyproject.toml.
        # That pin is exact (==) because flake.nix asserts the "==" form, so the
        # installed uv must match exactly or every uv command fails the gate.
        version: "0.8.17"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python ${{ inputs.python-version }}
      run: uv python install ${{ inputs.python-version }}
      shell: bash

    - name: Install dependencies
      run: uv sync --locked
      shell: bash
